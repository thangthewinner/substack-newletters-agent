pull:
- prefect.deployments.steps.git_clone:
    id: clone-step
    repository: https://github.com/thangthewinner/substack-newletters-search
    credentials: "{{ prefect.blocks.github-credentials.my-gh-creds }}"

- prefect.deployments.steps.run_shell_script:
    id: install-build-tools
    script: |
      apt-get update -y
      apt-get install -y --no-install-recommends build-essential g++

- prefect.deployments.steps.pip_install_requirements:
    directory: "{{ clone-step.directory }}"
    requirements_file: requirements.txt
    stream_output: true

deployments:
  - name: rss-ingest
    entrypoint: src/pipelines/flows/rss_ingestion_flow.py:rss_ingest_flow
    work_pool:
      name: substack-newletters-agent
      job_variables:
        env:
          SUPABASE_DB__TABLE_NAME: "{{$SUPABASE_DB__TABLE_NAME}}"
          SUPABASE_DB__HOST: "{{$SUPABASE_DB__HOST}}"
          SUPABASE_DB__NAME: "{{$SUPABASE_DB__NAME}}"
          SUPABASE_DB__USER: "{{$SUPABASE_DB__USER}}"
          SUPABASE_DB__PASSWORD: "{{$SUPABASE_DB__PASSWORD}}"
          SUPABASE_DB__PORT: "{{$SUPABASE_DB__PORT}}"

    schedule:
      cron: "0 0 * * 7"

  - name: qdrant-embeddings
    entrypoint: src/pipelines/flows/embeddings_ingestion_flow.py:qdrant_ingest_flow
    work_pool:
      name: substack-newletters-agent
      job_variables:
        env:
          SUPABASE_DB__TABLE_NAME: "{{$SUPABASE_DB__TABLE_NAME}}"
          SUPABASE_DB__HOST: "{{$SUPABASE_DB__HOST}}"
          SUPABASE_DB__NAME: "{{$SUPABASE_DB__NAME}}"
          SUPABASE_DB__USER: "{{$SUPABASE_DB__USER}}"
          SUPABASE_DB__PASSWORD: "{{$SUPABASE_DB__PASSWORD}}"
          SUPABASE_DB__PORT: "{{$SUPABASE_DB__PORT}}"
          QDRANT__API_KEY: "{{$QDRANT__API_KEY}}"
          QDRANT__URL: "{{$QDRANT__URL}}"
          QDRANT__COLLECTION_NAME: "{{$QDRANT__COLLECTION_NAME}}"

    schedule:
      cron: "0 0 * * 7"